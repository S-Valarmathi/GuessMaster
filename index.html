<!DOCTYPE html>
<html>
<head>

<title>Guess Number Master</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#6366f1,#1e293b 50%,#020617);
}

.container{

    width:380px;
    padding:40px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);

}


h1{
    color:white;
    font-size:27px;
    margin-bottom:15px;
    white-space:nowrap;
}


p{
    color:#cbd5e1;
    margin-bottom:20px;
}


input{

    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:16px;
    text-align:center;

}


button{

    margin-top:20px;
    padding:13px 35px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;

}


button:hover{

    transform:scale(1.08);

}


#result{

    margin-top:25px;
    color:white;
    font-size:18px;
    font-weight:bold;

}


#score{

    color:white;
    font-size:17px;

}

</style>

</head>


<body>


<div class="container">


<h1>🎯 Guess Number Master</h1>


<p>Guess the hidden number between 1 - 10</p>


<input id="guessnumber" type="number" placeholder="Enter your number">


<button onclick="check()">Check</button>


<p id="result">Start Your Challenge 🚀</p>


<p id="score">🏆 Score : 10</p>



<script>


var guessnumber = document.getElementById("guessnumber")

var result = document.getElementById("result")

var score = document.getElementById("score")


var randomNumber = Math.floor(Math.random()*10)+1

var totalScore = 10



function check()

{

var enteredNumber = Number(guessnumber.value)



if(randomNumber == enteredNumber)

{

alert("🎉🥳 Congratulations!\n\n✨ You found the correct number!\n🏆 You are a Number Master!")

result.textContent="🎯 Perfect Guess! You Won 🏆"

}


else

{

totalScore = totalScore-1

score.textContent="🏆 Score : "+totalScore


alert("😅 Oops!\n\n❌ Wrong Guess\n🎯 Try Again!")


result.textContent="Keep Trying 🚀"

}


}


</script>


</div>


</body>
</html>
